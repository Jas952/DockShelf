name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Build macOS app
    runs-on: macos-14

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build debug configuration
        run: swift build

      - name: Build release configuration
        run: swift build -c release
